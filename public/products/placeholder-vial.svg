<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Cream background matches catalog page color -->
  <rect width="400" height="400" fill="#F4F1EA"/>
  <!-- Subtle radial vignette to add depth without competing with real photos -->
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#E5E0D2"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B0F1A" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#0B0F1A" stop-opacity="0.02"/>
      <stop offset="65%" stop-color="#0B0F1A" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0B0F1A" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E4DDB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2E4DDB" stop-opacity="0.32"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#vig)"/>

  <!-- Vial — centered, modern pharmaceutical proportions -->
  <g transform="translate(200, 200)">
    <!-- Cap (aluminum crimp) -->
    <rect x="-30" y="-115" width="60" height="22" rx="2" fill="#0B0F1A"/>
    <rect x="-32" y="-95" width="64" height="6" rx="1" fill="#0B0F1A" opacity="0.85"/>
    <!-- Rubber stopper inside the neck -->
    <rect x="-26" y="-89" width="52" height="6" fill="#0B0F1A" opacity="0.6"/>
    <!-- Glass body -->
    <rect x="-42" y="-83" width="84" height="180" rx="6" fill="url(#glass)" stroke="#0B0F1A" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- Liquid fill (lower 2/3) -->
    <rect x="-40" y="-15" width="80" height="110" fill="url(#liquid)"/>
    <!-- Subtle label area -->
    <rect x="-34" y="20" width="68" height="50" fill="#ffffff" opacity="0.85"/>
    <text x="0" y="42" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="900" letter-spacing="2.4" fill="#0B0F1A">MERIT</text>
    <text x="0" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="6" letter-spacing="1.6" fill="#2E4DDB">SCIENCES</text>
    <!-- Highlight on left side of glass for depth -->
    <rect x="-38" y="-78" width="6" height="170" rx="3" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Bottom eyebrow text — signals this is a placeholder, not a real photo -->
  <text x="200" y="370" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="2.8" fill="#5C6378" opacity="0.6">— LYOPHILIZED VIAL —</text>
</svg>
