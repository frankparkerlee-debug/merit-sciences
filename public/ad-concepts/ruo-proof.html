<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- Meta creative in the proven RUO formula (4:5, 1080x1350): trust hook ->
       green-check spec list -> RUO disclaimer -> CTA. Lab/clinical voice, speaks
       to researchers. ZERO molecule names, no bodies, no labeled-drug vial.
       Transparency angle (show the data) one-ups the COA-claim crowd. Screenshot
       the .ad box for the ad. -->
  <title>Merit - RUO proof creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink:#08152e; --cobalt:#173a8a; --cobalt-soft:#5e84d6; --cream:#f4f1ea; --green:#3ECf8E; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1326; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .ad {
      position: relative; width: 1080px; height: 1350px; max-width: 100%;
      aspect-ratio: 4 / 5; overflow: hidden; border-radius: 6px;
      background:
        radial-gradient(75% 50% at 80% 8%, rgba(94,132,214,0.40) 0%, rgba(23,58,138,0) 60%),
        linear-gradient(168deg, #0c1f48 0%, #08152e 58%, #060f22 100%);
      color: var(--cream);
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 80px 78px;
    }
    .ad::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 88px 88px;
    }
    .top { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
    .wm { font-size: 38px; font-weight: 800; letter-spacing: 0.42em; text-indent: 0.42em; }
    .ruoTag {
      font-size: 16px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--cobalt-soft); border: 1px solid rgba(94,132,214,0.4); border-radius: 999px; padding: 9px 16px;
    }
    .mid { position: relative; z-index: 1; }
    h1 { font-size: 104px; line-height: 0.96; font-weight: 800; letter-spacing: -0.03em; }
    .chart { margin-top: 40px; width: 100%; height: 150px; display: block; }
    .checks { position: relative; z-index: 1; list-style: none; display: flex; flex-direction: column; gap: 20px; margin-top: 8px; }
    .checks li { display: flex; align-items: flex-start; gap: 18px; font-size: 30px; font-weight: 600; line-height: 1.25; color: rgba(244,241,234,0.94); }
    .checks .ck {
      flex: none; width: 38px; height: 38px; margin-top: 2px; border-radius: 10px;
      background: rgba(62,207,142,0.14); border: 1px solid rgba(62,207,142,0.5);
      color: var(--green); font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center;
    }
    .foot { position: relative; z-index: 1; }
    .cta { display: inline-flex; align-items: center; gap: 12px; font-size: 32px; font-weight: 800; color: var(--ink); background: var(--cream); padding: 18px 30px; border-radius: 14px; }
    .ruoLine { margin-top: 24px; font-size: 21px; font-weight: 500; letter-spacing: 0.01em; color: rgba(244,241,234,0.5); }
  </style>
</head>
<body>
  <div class="ad">
    <div class="top">
      <div class="wm">MERIT</div>
      <div class="ruoTag">Research Use Only</div>
    </div>

    <div class="mid">
      <h1>See the data.<br />Every lot.</h1>
      <svg class="chart" viewBox="0 0 900 150" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="138" x2="900" y2="138" stroke="rgba(244,241,234,0.18)" stroke-width="2" />
        <polyline points="0,132 120,130 230,128 300,126 340,40 372,12 404,40 470,120 540,124 610,122 660,70 690,52 720,70 790,120 900,124"
          fill="none" stroke="#5e84d6" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />
      </svg>
    </div>

    <ul class="checks">
      <li><span class="ck">&#10003;</span><span>HPLC &#8805;99% purity &mdash; COA + chromatogram on every lot</span></li>
      <li><span class="ck">&#10003;</span><span>Made in the USA &middot; ships same-day from Dallas</span></li>
      <li><span class="ck">&#10003;</span><span>No fillers, no TFA, no binders</span></li>
    </ul>

    <div class="foot">
      <span class="cta">Verify, don't trust &rarr;</span>
      <p class="ruoLine">For research use only. Not for human consumption.</p>
    </div>
  </div>
</body>
</html>
