# Render service config — deploy via "New Web Service" pointed at this repo
# https://render.com/docs/deploy-nextjs-app
services:
  - type: web
    name: merit-render
    runtime: node
    plan: starter            # bump to 'standard' once traffic grows
    region: oregon           # closest to Dallas warehouse for cold-start latency
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Stripe — populate in Render dashboard before deploy.
      # STRIPE_SECRET_KEY   — sk_test_… for now, swap to sk_live_… at launch
      # STRIPE_WEBHOOK_SECRET — set after creating the webhook endpoint
      #   in Stripe Dashboard (https://dashboard.stripe.com/webhooks).
      #   The endpoint URL is https://[your-domain]/api/stripe/webhook
      #   and you'll subscribe to checkout.session.completed.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # NEXT_PUBLIC_SITE_URL — used to build success/cancel URLs for
      # Stripe. Defaults to the request origin if not set.
      - key: NEXT_PUBLIC_SITE_URL
        value: https://merit-sciences.onrender.com
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_STOREFRONT_TOKEN
        sync: false           # only needed if we headless the Shopify catalog later
      # ─── Supabase (affiliate portal) ────────────────────────────────
      # Project URL + publishable key are safe to expose (RLS protects data).
      # Secret key + DATABASE_URL contain credentials — populate in dashboard.
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://jwjxgujqadftwygwkpbp.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_HrBciWZlXN4v9lIovtgQ9Q_xiasbprA
      - key: SUPABASE_SECRET_KEY
        sync: false           # populate in dashboard
      - key: DATABASE_URL
        sync: false           # populate in dashboard — full pooler URL w/ password
