# Render service config — deploy via "New Web Service" pointed at this repo
# https://render.com/docs/deploy-nextjs-app
services:
  - type: web
    name: merit-render
    runtime: node
    plan: starter            # bump to 'standard' once traffic grows
    region: oregon           # closest to Dallas warehouse for cold-start latency
    buildCommand: npm install && npm run build
    startCommand: npm run start
    # /api/health is exempt from middleware — the onrender→meritsciences.com
    # 301 in middleware.ts would otherwise redirect the probe and fail deploys.
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Stripe — populate in Render dashboard before deploy.
      # STRIPE_SECRET_KEY   — sk_test_… for now, swap to sk_live_… at launch
      # STRIPE_WEBHOOK_SECRET — set after creating the webhook endpoint
      #   in Stripe Dashboard (https://dashboard.stripe.com/webhooks).
      #   The endpoint URL is https://[your-domain]/api/stripe/webhook
      #   and you'll subscribe to checkout.session.completed.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # NEXT_PUBLIC_SITE_URL — used to build success/cancel URLs for
      # Stripe. Defaults to the request origin if not set.
      # Canonical public origin — used for PayPal return URLs, auth callbacks,
      # email links, and affiliate referral links. MUST be the custom domain;
      # the onrender.com URL now 301s to it (middleware.ts).
      - key: NEXT_PUBLIC_SITE_URL
        value: https://meritsciences.com
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_STOREFRONT_TOKEN
        sync: false           # only needed if we headless the Shopify catalog later
      # ─── Supabase (affiliate portal) ────────────────────────────────
      # Project URL + publishable key are safe to expose (RLS protects data).
      # Secret key + DATABASE_URL contain credentials — populate in dashboard.
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://jwjxgujqadftwygwkpbp.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_HrBciWZlXN4v9lIovtgQ9Q_xiasbprA
      - key: SUPABASE_SECRET_KEY
        sync: false           # populate in dashboard
      - key: DATABASE_URL
        sync: false           # populate in dashboard — full pooler URL w/ password
      # ─── PostHog analytics ──────────────────────────────────────────
      # NEXT_PUBLIC_ keys are inlined into the client bundle at BUILD time,
      # so set the key in the dashboard then redeploy for it to take effect.
      # Public project (write) key — ships in the client bundle, safe to commit.
      - key: NEXT_PUBLIC_POSTHOG_KEY
        value: phc_xjAJ2o3sxD4z79k7cTcnS8dCAgt3kpBxCkGG6fyd2U3B
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
      # Server-side READ access for the native in-admin analytics (Query API).
      # Personal API key (scopes: query:read, insight:read) — populate in
      # dashboard; never goes to the browser.
      - key: POSTHOG_PERSONAL_API_KEY
        sync: false
      - key: POSTHOG_PROJECT_ID
        sync: false           # numeric project id (PostHog → Settings → Project)
      # ─── Abandoned-cart recovery ────────────────────────────────────
      # Carts are CAPTURED + shown in /admin/analytics unconditionally. The
      # automated recovery EMAIL is outward-facing, so it's opt-in: set this
      # to `on` (and add a Render Cron Job hitting /api/cron/abandoned-carts
      # with the CRON_SECRET bearer) to arm the hourly nudge. Unset = no sends.
      - key: ABANDONED_CART_RECOVERY
        sync: false           # set to "on" to enable recovery emails
      # CRON_SECRET — bearer shared by every /api/cron/* job. Set in dashboard;
      # reuse the existing value for the abandoned-cart cron.
      - key: CRON_SECRET
        sync: false
      # ─── Prospect email drip ────────────────────────────────────────
      # Nurtures newsletter/gate leads who haven't purchased (lib/prospect-
      # emails.ts). Add a DAILY Render Cron Job hitting /api/cron/prospect-emails
      # with the CRON_SECRET bearer to arm it. Suppresses anyone in `customers`;
      # unsubscribe link is signed with UNSUB_SECRET (falls back to CRON_SECRET).
      - key: UNSUB_SECRET
        sync: false           # optional; used to sign one-click unsubscribe links
